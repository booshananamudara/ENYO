<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EnyoCart</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

  <!-- ── Header ────────────────────────────────────────────────────── -->
  <header class="popup-header">
    <div class="popup-header__brand">
      <!-- ENYO Logo SVG -->
      <svg class="popup-header__logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36" fill="none" aria-hidden="true">
        <rect width="36" height="36" rx="8" fill="#1B3A5C"/>
        <path d="M8 10h20M8 18h14M8 26h20" stroke="#2E75B6" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M18 26V10l6 8-6 8z" fill="#2E75B6"/>
      </svg>
      <div>
        <span class="popup-header__title">EnyoCart</span>
        <span class="popup-header__sub">Shop Anywhere, Checkout Once</span>
      </div>
    </div>
    <div class="popup-header__badge-wrap">
      <span id="cart-count-badge" class="popup-badge" aria-label="Items in cart">0</span>
    </div>
  </header>

  <!-- ── Cart Items ─────────────────────────────────────────────────── -->
  <main class="popup-main" id="popup-main">

    <!-- Empty state -->
    <div id="empty-state" class="empty-state" hidden>
      <svg class="empty-state__icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
        <circle cx="40" cy="40" r="38" fill="#F5F8FB" stroke="#E2EAF3" stroke-width="2"/>
        <path d="M24 28h32l-4 20H28L24 28z" fill="#D1E4F5" stroke="#2E75B6" stroke-width="1.5" stroke-linejoin="round"/>
        <circle cx="32" cy="52" r="3" fill="#2E75B6"/>
        <circle cx="48" cy="52" r="3" fill="#2E75B6"/>
        <path d="M20 24h4l3 4" stroke="#2E75B6" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M37 36v8M33 40h8" stroke="#1B3A5C" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
      <p class="empty-state__title">Your cart is empty</p>
      <p class="empty-state__sub">Browse any online store and click the<br><strong>ENYO button</strong> to add products here.</p>
    </div>

    <!-- Cart items list -->
    <ul id="cart-list" class="cart-list" aria-label="Cart items"></ul>

  </main>

  <!-- ── Footer / Summary ───────────────────────────────────────────── -->
  <footer id="popup-footer" class="popup-footer" hidden>
    <div class="popup-summary">
      <div class="popup-summary__row">
        <span class="popup-summary__label">
          <span id="item-count-text">0 items</span>
        </span>
        <span class="popup-summary__subtotal" id="subtotal-display">$0.00</span>
      </div>
    </div>

    <div class="popup-footer__actions">
      <button id="btn-open-panel" class="btn btn--secondary" type="button">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
        Full Cart
      </button>
      <button id="btn-checkout" class="btn btn--primary" type="button">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        Checkout
      </button>
    </div>
  </footer>

  <!-- Loading state -->
  <div id="loading-state" class="loading-state">
    <div class="loading-spinner"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
