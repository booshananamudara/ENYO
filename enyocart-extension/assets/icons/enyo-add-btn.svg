<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none" role="img" aria-label="Add to EnyoCart">
  <!-- Circular background -->
  <circle cx="20" cy="20" r="20" fill="#1B3A5C"/>

  <!-- Shopping bag outline -->
  <path d="M13 16h14l-1.5 11H14.5L13 16z"
        fill="none" stroke="white" stroke-width="1.8"
        stroke-linejoin="round"/>

  <!-- Bag handle -->
  <path d="M16.5 16v-2a3.5 3.5 0 017 0v2"
        stroke="white" stroke-width="1.8"
        stroke-linecap="round"/>

  <!-- Plus icon -->
  <line x1="20" y1="20" x2="20" y2="25" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="17.5" y1="22.5" x2="22.5" y2="22.5" stroke="white" stroke-width="2" stroke-linecap="round"/>
</svg>
