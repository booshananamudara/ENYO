<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EnyoCart — Full Cart</title>
  <link rel="stylesheet" href="sidepanel.css" />
</head>
<body>

  <!-- ── Header ────────────────────────────────────────────────────── -->
  <header class="sp-header">
    <div class="sp-header__brand">
      <svg class="sp-header__logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36" fill="none" aria-hidden="true">
        <rect width="36" height="36" rx="8" fill="#1B3A5C"/>
        <path d="M8 10h20M8 18h14M8 26h20" stroke="#2E75B6" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M18 26V10l6 8-6 8z" fill="#2E75B6"/>
      </svg>
      <div>
        <span class="sp-header__title">EnyoCart</span>
        <span class="sp-header__sub">Full Cart View</span>
      </div>
    </div>
    <div class="sp-header__actions">
      <span id="sp-badge" class="sp-badge">0</span>
      <button id="btn-clear-cart" class="sp-icon-btn sp-icon-btn--danger" title="Clear cart" aria-label="Clear all items">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- ── Main ──────────────────────────────────────────────────────── -->
  <main class="sp-main" id="sp-main">

    <!-- Loading -->
    <div id="sp-loading" class="sp-loading">
      <div class="sp-spinner"></div>
    </div>

    <!-- Empty state -->
    <div id="sp-empty" class="sp-empty" hidden>
      <svg class="sp-empty__icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
        <circle cx="40" cy="40" r="38" fill="#F5F8FB" stroke="#E2EAF3" stroke-width="2"/>
        <path d="M24 28h32l-4 20H28L24 28z" fill="#D1E4F5" stroke="#2E75B6" stroke-width="1.5" stroke-linejoin="round"/>
        <circle cx="32" cy="52" r="3" fill="#2E75B6"/><circle cx="48" cy="52" r="3" fill="#2E75B6"/>
        <path d="M37 36v8M33 40h8" stroke="#1B3A5C" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
      <p class="sp-empty__title">Cart is empty</p>
      <p class="sp-empty__sub">Visit any online store and click the ENYO button to start adding products.</p>
    </div>

    <!-- Cart grouped by vendor -->
    <div id="sp-cart-content" hidden>
      <div id="sp-groups"></div>
    </div>

  </main>

  <!-- ── Footer ────────────────────────────────────────────────────── -->
  <footer id="sp-footer" class="sp-footer" hidden>
    <div class="sp-totals">
      <div class="sp-totals__row">
        <span>Items</span>
        <span id="sp-item-count">0</span>
      </div>
      <div class="sp-totals__row">
        <span>Subtotal</span>
        <span class="sp-totals__subtotal" id="sp-subtotal">$0.00</span>
      </div>
      <div class="sp-totals__row sp-totals__row--fee">
        <span>Service fee (3%)</span>
        <span id="sp-fee">$0.00</span>
      </div>
      <div class="sp-totals__row sp-totals__row--total">
        <span>Total</span>
        <span id="sp-total">$0.00</span>
      </div>
    </div>
    <button id="btn-checkout" class="sp-checkout-btn" type="button">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      Proceed to Checkout
    </button>
  </footer>

  <!-- ── Clear Cart Confirm Modal ───────────────────────────────────── -->
  <div id="confirm-modal" class="modal-overlay" hidden>
    <div class="modal">
      <div class="modal__icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#E74C3C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/>
        </svg>
      </div>
      <h3 class="modal__title">Clear Cart?</h3>
      <p class="modal__text">This will remove all <strong id="modal-count">0</strong> items from your cart. This action cannot be undone.</p>
      <div class="modal__actions">
        <button id="modal-cancel" class="sp-btn sp-btn--secondary">Cancel</button>
        <button id="modal-confirm" class="sp-btn sp-btn--danger">Clear Cart</button>
      </div>
    </div>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
